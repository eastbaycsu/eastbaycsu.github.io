<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>BMI Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
           <h1 class="">Body Mass Index (BMI) Calculator</h1>
           Height (cm):
           <input class="input" id="height" type="number" value="180" placeholder="Enter your height in cm.">
           Weight (kg):
           <input class="input" id="weight" type="number" value="80" placeholder="Enter your weight in kg.">
           <button class="btn" id="btn">Compute BMI</button>
           <input class="input" id="bmi-result" disabled type="number" value="">
           <p class="info-text">Weight Condition: <span id="weight-condition"></span> </p>
        </div>

    <script src="script.js"></script>
    </body>
</html>
