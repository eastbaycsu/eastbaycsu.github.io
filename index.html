<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>BMI Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
            <h1 class="">Body Mass Index (BMI) Calculator</h1>
            Height (cm):
            <input id="height" class="input" type="number" value="180" placeholder="Enter height">
            Weight (kg):
            <input id="weight" class="input" type="number" value="80" placeholder="Enter weight">
            <button id="btn" class="btn">Compute BMI</button>
            <input id="bmi-result" class="input" disabled type="number" value="" placeholder="">
            <p class="info-text">Weight Condition: <span id="weight-condition"></span> </p>
        </div>

        <script src="script.js"></script>
    </body>
</html>
