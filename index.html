<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>BMI calculator</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="container">
      <!-- Add header -->
      <h1>Body Mass Index (BMI) Calculator</h1>

      Height (cm):
      <input type="number" name="" value="180" class="input" id="height">

      Weight (kg):
      <input type="number" name="" value="80" class="input" id="weight">

      <button type="button" name="button" class="btn" id="btn">Compute BMI</button>
      <input type="text" name="" value="" disabled class="input" id="bmi-result">

      <h4>Weight Condition: <span id="weight-condition"></span> </h4>

    </div>

    <script src="index.js"></script>

  </body>
</html>
