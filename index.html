<!DOCTYPE html>
<html lang="en" dir="ltr">

  <head>
    <meta charset="utf-8">
    <title>BMI Calculator</title>
    <link rel="stylesheet" href="style.css">
  </head>

  <body>
    <div class="container">
      <h1 class="heading" id="">Body Mass Index (BMI) Calculator</h1>

      <label class="">Height (cm):</label>
      <input type="number" name="" value="180" class="input" id="height">

      Weight (kg):
      <input type="number" name="" value="80" class="input" id="weight">

      <button type="button" name="button" class="btn" id="btn">Compute BMI</button>

      <input disabled type="text" name="" value="" class="input" id="bmi-result">

      <h4 class="info-text" id="weight-condition">Weight Condition:</h4>

    </div>

    <script src="script.js"></script>

  </body>
</html>
