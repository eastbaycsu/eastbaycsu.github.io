<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <title>BMI Calculator</title>
        <link rel="stylesheet" href="style.css">
    </head>
    <body>
        <div class="container">
           <h1 class="">Body Mass Index (BMI) Calculator</h1>
           Height (cm):
           <input class="input" id="" type="number" value="180" placeholder="Enter your height in cm.">
           Weight (kg):
           <input class="input" id="" type="number" value="80" placeholder="Enter your weight in kg.">
           <button class="btn" id="">Compute BMI</button>
           <input class="input" id="" disabled type="number" value="">
           <p class="info-text">Weight Condition: <span id=""></span> </p>
        </div>
    </body>
</html>
